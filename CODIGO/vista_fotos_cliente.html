<!DOCTYPE html>

<head>

    <style>
        .visita-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .nav-btn {
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: #fff;

            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }

        .nav-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        .lightbox-close {
            z-index: 10001 !important;
        }

        .lightbox-actions {
            position: absolute;
            top: 32px;
            right: 40px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            z-index: 10002;
        }

        .lightbox-actions button {
            width: 42px;
            height: 42px;
            border-radius: 999px;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(15, 23, 42, 0.88);
            color: #e5e7eb;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.55);
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, color 0.15s ease;
        }

        .lightbox-actions button i {
            font-size: 18px;
        }

        .lightbox-actions button:hover {
            transform: translateY(-1px) scale(1.05);
            background: rgba(220, 38, 38, 0.95);
            color: #fff;
            box-shadow: 0 16px 35px rgba(0, 0, 0, 0.65);
        }

        .lightbox-meta {
            position: relative;
            order: -1;
            left: auto;
            transform: none;
            margin: 0 0 15px 0;
            background: rgba(18, 18, 18, 0.9);
            padding: 10px 24px;
            border-radius: 30px;
            color: #fff;
            text-align: center;
            z-index: 1000;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(220, 38, 38, 0.3);
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            width: fit-content;
            max-width: 90vw;
            transition: all 0.3s ease;
        }

        .lightbox-meta span {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #ddd;
            white-space: nowrap;
        }

        .lightbox-meta i {
            color: #dc2626;
            width: 16px;
        }

        .btn-volver {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #ef4444;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-volver:hover {
            background: #ef4444;
            color: white;
            transform: translateX(-3px);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .btn-pptx {
            background: #dc2626;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            flex-direction: row;
            flex-wrap: nowrap;
            gap: 10px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
            margin-right: 15px;
            white-space: nowrap;
        }

        .btn-pptx:hover {
            background: #b91c1c;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(220, 38, 38, 0.4);
        }

        @media (max-width: 768px) {
            .btn-pptx span {
                display: none;
            }

            .btn-pptx {
                padding: 10px;
            }
        }
    </style>
</head>

    <div class="lightbox" id="lightbox">

    <script>
        const URL_BASE = '/api';

        let visitasData = [];
        let filteredVisitas = [];
        let visitaIndex = 0;

        async function cargarVisitasCliente() {
            const idCliente = localStorage.getItem('id_usuario');
            const tipo = Number(localStorage.getItem('tipoUsuario'));
            if (tipo !== 2 || !idCliente) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const res = await fetch(`${URL_BASE}/imagenes-aprobadas-cliente?id_cliente=${idCliente}`);
                if (!res.ok) {
                    document.getElementById('contenedorVisitas').innerHTML = '<p>Error al obtener las imágenes.</p>';
                    return;
                }
                visitasData = await res.json();
                if (visitasData.length === 0) {
                    document.getElementById('contenedorVisitas').innerHTML = '<p>No hay imágenes aprobadas.</p>';
                    return;
                }
                populateFilters();
                clearFilters();
            } catch (err) {
                console.error('Error al cargar visitas:', err);
                document.getElementById('contenedorVisitas').innerHTML = '<p>Error de conexión al cargar las imágenes.</p>';
            }
        }

        function renderVisita(idx) {
            const v = filteredVisitas[idx];
            const cont = document.getElementById('contenedorVisitas');

            const imgsHtml = v.imagenes.map((img, i) => {
                return `
                <div class="foto-card" onclick="openLightbox(${i})">
                    <div class="foto-wrapper">
                        <img src="../IMG/${img.ruta}" alt="Foto ${i + 1}" data-rotation="0" class="img-preview">
                    </div>
                    <button class="btn-rotar-gallery" onclick="rotarImagenGaleria(this, event)" title="Rotar vista">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>`;
            }).join('');

            cont.innerHTML = `
                <div class="visita-seccion">
                    <div class="visita-header">
                        <h1>${v.cadena}</h1>
                        <div class="sub">
                            <i class="fas fa-map-marker-alt"></i> ${v.sucursal} - ${v.localidad} | 
                            <i class="fas fa-calendar-alt"></i> ${new Date(v.fecha).toLocaleDateString('es-AR', { timeZone: 'UTC' })}
                        </div>
                    </div>
                    <div class="galeria-grid">
                        ${imgsHtml}
                    </div>
                </div>`;

            const nav = document.getElementById('navVisitas');
            if (nav) nav.style.display = filteredVisitas.length > 1 ? 'flex' : 'none';
        }

        function rotarImagenGaleria(btn, e) {
            e.stopPropagation();
            const img = btn.parentElement.querySelector('img');
            let rot = (parseInt(img.getAttribute('data-rotation')) + 90) % 360;
            img.setAttribute('data-rotation', rot);
            img.style.transform = `rotate(${rot}deg) ${(rot % 180 !== 0) ? 'scale(0.8)' : ''}`;
        }

        function populateFilters() {
            const makeOptions = (items) => {
                const uniq = [...new Set(items)];
                return uniq.map(x => `<option value="${x}">${x}</option>`).join('');
            };
            const llenar = (id, opciones, titulo) => {
                const sel = document.getElementById(id);
                sel.innerHTML = `<option value="">${titulo}</option>` + opciones;
            };
            llenar('filtroCadena', makeOptions(visitasData.map(v => v.cadena)), 'Cadena (todas)');
            llenar('filtroSucursal', makeOptions(visitasData.map(v => v.sucursal)), 'Sucursal (todas)');
            llenar('filtroZona', makeOptions(visitasData.map(v => v.zona)), 'Zona (todas)');
            llenar('filtroSubzona', makeOptions(visitasData.map(v => v.subzona)), 'Subzona (todas)');
            llenar('filtroCanal', makeOptions(visitasData.map(v => v.canal)), 'Canal (todos)');
        }

        function applyFilters() {
            const fDesde = document.getElementById('fechaDesde').value;
            const fHasta = document.getElementById('fechaHasta').value;
            const fCad = document.getElementById('filtroCadena').value;
            const fSuc = document.getElementById('filtroSucursal').value;
            const fZona = document.getElementById('filtroZona').value;
            const fSubzona = document.getElementById('filtroSubzona').value;
            const fCanal = document.getElementById('filtroCanal').value;
            filteredVisitas = visitasData.filter(v => {
                if (fDesde) {
                    const vDate = new Date(v.fecha).setHours(0, 0, 0, 0);
                    const dDesde = new Date(fDesde).setHours(0, 0, 0, 0);
                    if (vDate < dDesde) return false;
                }
                if (fHasta) {
                    const vDate = new Date(v.fecha).setHours(0, 0, 0, 0);
                    const dHasta = new Date(fHasta).setHours(0, 0, 0, 0);
                    if (vDate > dHasta) return false;
                }
                if (fCad && v.cadena !== fCad) return false;
                if (fSuc && v.sucursal !== fSuc) return false;
                if (fZona && v.zona !== fZona) return false;
                if (fSubzona && v.subzona !== fSubzona) return false;
                if (fCanal && v.canal !== fCanal) return false;
                return true;
            });
            visitaIndex = 0;
            if (filteredVisitas.length === 0) {
                document.getElementById('contenedorVisitas').innerHTML = '<p>No hay visitas que coincidan.</p>';
                document.getElementById('prevVisita').style.display = 'none';
                document.getElementById('nextVisita').style.display = 'none';
                return;
            }
            renderVisita(visitaIndex);
        }

        function clearFilters() {
            ['fechaDesde', 'fechaHasta', 'filtroCadena', 'filtroSucursal', 'filtroZona', 'filtroSubzona', 'filtroCanal']
                .forEach(id => document.getElementById(id).value = '');
            applyFilters();
        }

        // --- LIGHTBOX ---
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        const lbDownload = document.getElementById('lightbox-download');
        const lbRotate = document.getElementById('lightbox-rotate');
        let currentImg = 0;

        function openLightbox(index) {
            currentImg = index;
            const v = filteredVisitas[visitaIndex];
            const ruta = v.imagenes[index].ruta;

            lbImg.src = `../IMG/${ruta}`;
            lbImg.setAttribute('data-rotation', 0);
            lbImg.style.transform = '';
            updateLightboxInfo();
            lightbox.classList.add('activo');
        }

        function updateLightboxInfo() {
            const v = filteredVisitas[visitaIndex];
            const contentEl = document.getElementById('lightbox-info-content');
            if (v && contentEl) {
                contentEl.innerHTML = `
                    <span><i class="fas fa-building"></i> ${v.cadena}</span>
                    <span><i class="fas fa-map-marker-alt"></i> ${v.sucursal}</span>
                    <span><i class="fas fa-calendar-alt"></i> ${new Date(v.fecha).toLocaleDateString('es-AR', { timeZone: 'UTC' })}</span>
                `;
            }
        }

        lbRotate.onclick = (e) => {
            e.stopPropagation();
            let rot = (parseInt(lbImg.getAttribute('data-rotation') || 0) + 90) % 360;
            lbImg.setAttribute('data-rotation', rot);
            const scale = (rot % 180 !== 0) ? 0.75 : 1;
            lbImg.style.transform = `rotate(${rot}deg) scale(${scale})`;
            const previews = document.querySelectorAll('.img-preview');
            if (previews[currentImg]) {
                previews[currentImg].setAttribute('data-rotation', rot);
                previews[currentImg].style.transform = `rotate(${rot}deg) ${(rot % 180 !== 0) ? 'scale(0.8)' : ''}`;
            }
        };

        function changeImage(delta) {
            const v = filteredVisitas[visitaIndex];
            if (!v || !v.imagenes) return;

            if (delta > 0 && currentImg === v.imagenes.length - 1) {
                visitaIndex = (visitaIndex + 1) % filteredVisitas.length;
                currentImg = 0;
            } else if (delta < 0 && currentImg === 0) {
                visitaIndex = (visitaIndex - 1 + filteredVisitas.length) % filteredVisitas.length;
                currentImg = filteredVisitas[visitaIndex].imagenes.length - 1;
            } else {
                currentImg = (currentImg + delta + v.imagenes.length) % v.imagenes.length;
            }

            renderVisita(visitaIndex);

            const nuevaVisita = filteredVisitas[visitaIndex];
            const ruta = nuevaVisita.imagenes[currentImg].ruta;
            lbImg.src = `../IMG/${ruta}`;
            lbImg.setAttribute('data-rotation', 0);
            lbImg.style.transform = '';
            updateLightboxInfo();
        }

        document.getElementById('lightbox-prev').onclick = (e) => { e.stopPropagation(); changeImage(-1); };
        document.getElementById('lightbox-next').onclick = (e) => { e.stopPropagation(); changeImage(1); };

        function closeLightbox() { lightbox.classList.remove('activo'); }
        document.getElementById('lightbox-close').onclick = closeLightbox;
        lightbox.onclick = (e) => { if (e.target === lightbox) closeLightbox(); };

        if (lbDownload) {
            lbDownload.onclick = (e) => {
                e.stopPropagation();
                const a = document.createElement('a');
                a.href = lbImg.src;
                a.download = 'foto_solvens.jpg';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
        }

        document.getElementById('prevVisita').onclick = () => {
            visitaIndex = (visitaIndex - 1 + filteredVisitas.length) % filteredVisitas.length;
            renderVisita(visitaIndex);
        };
        document.getElementById('nextVisita').onclick = () => {
            visitaIndex = (visitaIndex + 1) % filteredVisitas.length;
            renderVisita(visitaIndex);
        };

        // ─────────────────────────────────────────────────────────────────────
        // PPTX: conversión de imagen a base64
        // Las imágenes están en el mismo servidor, fetch directo alcanza.
        // ─────────────────────────────────────────────────────────────────────
        async function imgUrlToBase64(url) {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const blob = await res.blob();
                return await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const full  = reader.result;
                        const comma = full.indexOf(',');
                        const mime  = full.substring(5, full.indexOf(';'));
                        const b64   = full.substring(comma + 1);
                        resolve(`${mime};base64,${b64}`);
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (err) {
                console.error('Error cargando imagen:', err);
                return null;
            }
        }

        // ─────────────────────────────────────────────────────────────────────
        // GENERACIÓN PPTX
        // ─────────────────────────────────────────────────────────────────────
        async function generarReportePPTX() {
            const idCliente = localStorage.getItem('id_usuario');
            if (!idCliente) return;

            const btn = document.getElementById('btnExportarPPTX');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Generando...</span>';
            btn.disabled = true;

            try {
                const res = await fetch(`${URL_BASE}/imagenes-aprobadas-cliente?id_cliente=${idCliente}&latest=1`);
                if (!res.ok) throw new Error('Error al obtener datos del servidor');
                const ultimasVisitas = await res.json();

                if (!ultimasVisitas || ultimasVisitas.length === 0) {
                    alert('No hay visitas aprobadas para exportar.');
                    return;
                }

                const pres = new PptxGenJS();
                pres.layout = 'LAYOUT_16x9';

                // ── PORTADA ────────────────────────────────────────────────
                const portada = pres.addSlide();
                portada.background = { color: 'DC2626' };

                portada.addShape(pres.ShapeType.rect, {
                    x: 0, y: 4.2, w: 10, h: 1.425,
                    fill: { color: '991B1B' }, line: { color: '991B1B' }
                });

                portada.addText('Grupo Solvens', {
                    x: 0, y: 1.3, w: 10, h: 1.1,
                    fontSize: 48, color: 'FFFFFF', bold: true,
                    align: 'center', fontFace: 'Calibri', margin: 0
                });
                portada.addText('Reporte de Evidencia Fotográfica', {
                    x: 0, y: 2.45, w: 10, h: 0.7,
                    fontSize: 22, color: 'FECACA', align: 'center',
                    fontFace: 'Calibri', margin: 0
                });
                portada.addText(`Exportado el: ${new Date().toLocaleDateString('es-AR')}`, {
                    x: 0, y: 4.55, w: 10, h: 0.4,
                    fontSize: 13, color: 'FECACA', italic: true,
                    align: 'center', fontFace: 'Calibri', margin: 0
                });
                portada.addText(`${ultimasVisitas.length} punto${ultimasVisitas.length !== 1 ? 's' : ''} de venta`, {
                    x: 0, y: 4.95, w: 10, h: 0.3,
                    fontSize: 11, color: 'FCA5A5', align: 'center',
                    fontFace: 'Calibri', margin: 0
                });

                // ── DIAPOSITIVA POR CADA PDV ──────────────────────────────
                for (let vIdx = 0; vIdx < ultimasVisitas.length; vIdx++) {
                    const v = ultimasVisitas[vIdx];
                    const slide = pres.addSlide();
                    slide.background = { color: 'F8F8F8' };

                    slide.addShape(pres.ShapeType.rect, {
                        x: 0, y: 0, w: 10, h: 0.45,
                        fill: { color: 'DC2626' }, line: { color: 'DC2626' }
                    });
                    slide.addText('Grupo Solvens', {
                        x: 0, y: 0.07, w: 9.8, h: 0.3,
                        fontSize: 10, color: 'FFFFFF', align: 'right',
                        fontFace: 'Calibri', margin: 0
                    });

                    slide.addText(v.cadena, {
                        x: 0.5, y: 0.55, w: 9, h: 0.55,
                        fontSize: 22, color: 'DC2626', bold: true,
                        fontFace: 'Calibri', margin: 0
                    });

                    slide.addText(`${v.sucursal}  —  ${v.localidad}`, {
                        x: 0.5, y: 1.08, w: 7, h: 0.32,
                        fontSize: 13, color: '333333',
                        fontFace: 'Calibri', margin: 0
                    });

                    slide.addText(`Visita: ${new Date(v.fecha).toLocaleDateString('es-AR', { timeZone: 'UTC' })}`, {
                        x: 7, y: 1.08, w: 2.7, h: 0.32,
                        fontSize: 11, color: '888888', italic: true,
                        align: 'right', fontFace: 'Calibri', margin: 0
                    });

                    slide.addShape(pres.ShapeType.rect, {
                        x: 0.5, y: 1.42, w: 9, h: 0.025,
                        fill: { color: 'DDDDDD' }, line: { color: 'DDDDDD' }
                    });

                    const infoParts = [];
                    if (v.zona)    infoParts.push(`Zona: ${v.zona}`);
                    if (v.subzona) infoParts.push(`Subzona: ${v.subzona}`);
                    if (v.canal)   infoParts.push(`Canal: ${v.canal}`);
                    if (infoParts.length) {
                        slide.addText(infoParts.join('   |   '), {
                            x: 0.5, y: 1.47, w: 9, h: 0.28,
                            fontSize: 10, color: 'AAAAAA', fontFace: 'Calibri', margin: 0
                        });
                    }

                    slide.addText(`${vIdx + 1} / ${ultimasVisitas.length}`, {
                        x: 8.8, y: 5.25, w: 0.9, h: 0.25,
                        fontSize: 9, color: 'BBBBBB', align: 'right',
                        fontFace: 'Calibri', margin: 0
                    });

                    const imagenes = v.imagenes;

                    if (!imagenes || imagenes.length === 0) {
                        slide.addText('Sin imágenes aprobadas', {
                            x: 0.5, y: 3, w: 9, h: 1,
                            fontSize: 16, color: 'BBBBBB', align: 'center',
                            fontFace: 'Calibri', margin: 0
                        });
                        continue;
                    }

                    const areaX = 0.45;
                    const areaY = 1.85;
                    const areaW = 9.1;
                    const areaH = 3.55;

                    let cols, rows;
                    if      (imagenes.length === 1) { cols = 1; rows = 1; }
                    else if (imagenes.length === 2) { cols = 2; rows = 1; }
                    else if (imagenes.length <= 4)  { cols = 2; rows = 2; }
                    else if (imagenes.length <= 6)  { cols = 3; rows = 2; }
                    else                            { cols = 3; rows = 3; }

                    const gap   = 0.12;
                    const cellW = (areaW - gap * (cols - 1)) / cols;
                    const cellH = (areaH - gap * (rows - 1)) / rows;

                    for (let i = 0; i < Math.min(imagenes.length, cols * rows); i++) {
                        const col = i % cols;
                        const row = Math.floor(i / cols);
                        const x = areaX + col * (cellW + gap);
                        const y = areaY + row * (cellH + gap);

                        const imgUrl  = `${window.location.origin}/IMG/${imagenes[i].ruta}`;
                        const b64data = await imgUrlToBase64(imgUrl);

                        if (b64data) {
                            slide.addImage({
                                data: b64data,
                                x: x, y: y, w: cellW, h: cellH,
                                sizing: { type: 'contain', w: cellW, h: cellH }
                            });
                        } else {
                            slide.addShape(pres.ShapeType.rect, {
                                x: x, y: y, w: cellW, h: cellH,
                                fill: { color: 'E5E5E5' }, line: { color: 'CCCCCC' }
                            });
                            slide.addText('Sin imagen', {
                                x: x, y: y + cellH / 2 - 0.15, w: cellW, h: 0.3,
                                fontSize: 9, color: 'AAAAAA', align: 'center',
                                fontFace: 'Calibri', margin: 0
                            });
                        }
                    }
                }

                const nombreArchivo = `Reporte_Solvens_${new Date().toISOString().split('T')[0]}.pptx`;
                await pres.writeFile({ fileName: nombreArchivo });

            } catch (err) {
                console.error('Error al generar PPTX:', err);
                alert('Hubo un error al generar el PowerPoint. Revisá la consola para más detalles.');
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        document.getElementById('btnExportarPPTX').addEventListener('click', generarReportePPTX);

        cargarVisitasCliente();
    </script>

    <script src="js/filtros.js"></script>
</body>

</html>
