<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Solvens - Evidencia de Visita</title>
    <link rel="icon" href="../IMG/logo2.jpg" type="image/jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style/filtros.css">
    <link rel="stylesheet" href="style/vista_fotos.css">
    <!-- use same footer styling as inicioCliente -->
    <link rel="stylesheet" href="style/inicio.css">
    <!-- PptxGenJS Library -->
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <style>
        /* navigation between visits (copied from admin page) */
        .visita-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .nav-btn {
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: #fff;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }

        .nav-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        .lightbox-close {
            z-index: 10001 !important;
        }

        .lightbox-actions {
            position: absolute;
            top: 32px;
            right: 40px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            z-index: 10002;
        }

        .lightbox-actions button {
            width: 42px;
            height: 42px;
            border-radius: 999px;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(15, 23, 42, 0.88);
            color: #e5e7eb;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.55);
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, color 0.15s ease;
        }

        .lightbox-actions button i {
            font-size: 18px;
        }

        .lightbox-actions button:hover {
            transform: translateY(-1px) scale(1.05);
            background: rgba(220, 38, 38, 0.95);
            color: #fff;
            box-shadow: 0 16px 35px rgba(0, 0, 0, 0.65);
        }

        /* Info Card in Lightbox (The "Cartel") */
        .lightbox-meta {
            position: relative;
            order: -1;
            left: auto;
            transform: none;
            margin: 0 0 15px 0;
            background: rgba(18, 18, 18, 0.9);
            padding: 10px 24px;
            border-radius: 30px;
            color: #fff;
            text-align: center;
            z-index: 1000;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(220, 38, 38, 0.3);
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            width: fit-content;
            max-width: 90vw;
            transition: all 0.3s ease;
        }

        .lightbox-meta span {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #ddd;
            white-space: nowrap;
        }

        .lightbox-meta i {
            color: #dc2626;
            width: 16px;
        }

        /* Botón Volver */
        .btn-volver {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            /* Eliminado contorno */
            color: #ef4444;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-volver:hover {
            background: #ef4444;
            color: white;
            transform: translateX(-3px);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .btn-pptx {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            flex-direction: row;
            /* Asegurar misma fila */
            flex-wrap: nowrap;
            gap: 10px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3);
            margin-right: 15px;
            white-space: nowrap;
        }

        .btn-pptx:hover {
            background: #b71c1c;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(211, 47, 47, 0.4);
        }

        @media (max-width: 768px) {
            .btn-pptx span {
                display: none;
            }

            .btn-pptx {
                padding: 10px;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="header-left">
            <a href="inicioCliente.html" class="btn-volver" title="Volver al inicio">
                <i class="fas fa-arrow-left"></i>
            </a>
            <button class="btn-toggle-sidebar" id="btnToggleSidebar">

            <button id="btnExportarPPTX" class="btn-pptx" title="Generar reporte PowerPoint" style="margin-left: 15px;">

            </button>
        </div>
        <div class="header-center">
            <img src="../IMG/logo.png" alt="Logo Grupo Solvens" class="logo-nav">
        </div>
        <div class="header-right" style="display: flex; align-items: center;">
            <a href="login.html" class="btn-salir">Cerrar Sesión</a>
        </div>
    </header>
    <main class="contenido">
        <h1>Evidencia <span>Fotográfica</span></h1>
        <p class="page-subtitulo">Registro visual de visitas aprobadas</p>
        <div class="contenedor-layout">
            <aside class="sidebar-filtros" id="sidebarFiltros">
                <div class="sidebar-header">
                    <h2 class="titulo-filtros">Filtros</h2>
                    <button class="btn-cerrar-sidebar" id="btnCerrarSidebar"><i class="fas fa-times"></i></button>
                </div>
                <div class="grupo-filtro">
                    <div class="filtro-header">

                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione un rango de fechas:</p>
                        <div class="rango-fechas">
                            <div><label class="label-pequeno">Desde:</label><input type="date" class="input-fecha"
                                    id="fechaDesde"></div>
                            <div><label class="label-pequeno">Hasta:</label><input type="date" class="input-fecha"
                                    id="fechaHasta"></div>

                </div>
                <div class="grupo-filtro">
                    <div class="filtro-header">

                    </div>
                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione la cadena:</p>
                        <select class="select-filtro" id="filtroCadena">
                            <option value="">Todas</option>

                    </div>
                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione la sucursal:</p>
                        <select class="select-filtro" id="filtroSucursal">
                            <option value="">Todas</option>
                        </select>
                    </div>
                </div>
                <div class="grupo-filtro">
                    <div class="filtro-header">
                        <label class="label-filtro">Zona</label>

                    </div>
                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione la zona:</p>
                        <select class="select-filtro" id="filtroZona">
                            <option value="">Todas</option>
                        </select>
                    </div>
                </div>
                <div class="grupo-filtro">
                    <div class="filtro-header">
                        <label class="label-filtro">Subzona</label>
                        <i class="fas fa-chevron-down icono-toggle"></i>
                    </div>
                    <div class="filtro-contenido">
                        <p class="descripcion-filtro">Seleccione la subzona:</p>

                            <option value="">Todas</option>

                <div class="grupo-filtro">
                    <div class="filtro-header">
                        <label class="label-filtro">Canal</label>

                    </div>
                    <div class="filtro-contenido">

                <div class="botones-filtro" style="display:flex;gap:10px;">

    <!-- Navegación entre visitas (Fija a los costados) -->

    </div>

    <footer class="footer-contacto">
        <p><i class="fa-solid fa-envelope"></i> contacto@gruposolvens.com | <i class="fa-solid fa-phone"></i> +54 11
            1234-5678</p>
    </footer>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-prev" id="lightbox-prev" title="Imagen anterior">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="lightbox-next" id="lightbox-next" title="Siguiente imagen">

        <img class="lightbox-img" id="lightbox-img" src="" alt="">

    <script>
        const URL_BASE = '/api';

        let visitasData = [];
        let filteredVisitas = [];
        let visitaIndex = 0;
        let imgs = [];

        async function cargarVisitasCliente() {
            const idCliente = localStorage.getItem('id_usuario');
            const tipo = Number(localStorage.getItem('tipoUsuario'));
            if (tipo !== 2 || !idCliente) {
                window.location.href = 'login.html';
                return;
            }
            const res = await fetch(`${URL_BASE}/imagenes-aprobadas-cliente?id_cliente=${idCliente}`);
            if (!res.ok) {
                document.getElementById('contenedorVisitas').innerHTML = '<p>Error al obtener las imágenes.</p>';
                return;
            }
            visitasData = await res.json();
            if (visitasData.length === 0) {
                document.getElementById('contenedorVisitas').innerHTML = '<p>No hay imágenes aprobadas.</p>';
                return;
            }
            populateFilters();
            clearFilters();
        }

        function renderVisita(idx) {
            const v = filteredVisitas[idx];
            const cont = document.getElementById('contenedorVisitas');

            const imgsHtml = v.imagenes.map((img, i) => {
                return `
                <div class="foto-card" onclick="openLightbox(${i})">
                    <div class="foto-wrapper">
                        <img src="../IMG/${img.ruta}" alt="Foto ${i + 1}" data-rotation="0" class="img-preview">
                    </div>
                    <button class="btn-rotar-gallery" onclick="rotarImagenGaleria(this, event)" title="Rotar vista">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>`;
            }).join('');

            cont.innerHTML = `
                <div class="visita-seccion">
                    <div class="visita-header">
                        <h1>${v.cadena}</h1>
                        <div class="sub">
                            <i class="fas fa-map-marker-alt"></i> ${v.sucursal} - ${v.localidad} | 
                            <i class="fas fa-calendar-alt"></i> ${new Date(v.fecha).toLocaleDateString('es-AR', { timeZone: 'UTC' })}
                        </div>
                    </div>
                    <div class="galeria-grid">
                        ${imgsHtml}
                    </div>
                </div>`;

            const nav = document.getElementById('navVisitas');
            if (nav) nav.style.display = filteredVisitas.length > 1 ? 'flex' : 'none';
        }

        function rotarImagenGaleria(btn, e) {
            e.stopPropagation();
            const img = btn.parentElement.querySelector('img');
            let rot = (parseInt(img.getAttribute('data-rotation')) + 90) % 360;
            img.setAttribute('data-rotation', rot);
            img.style.transform = `rotate(${rot}deg) ${(rot % 180 !== 0) ? 'scale(0.8)' : ''}`;
        }

        function populateFilters() {
            const makeOptions = (items) => {
                const uniq = [...new Set(items)];
                return uniq.map(x => `<option value="${x}">${x}</option>`).join('');
            };
            const llenar = (id, opciones, titulo) => {
                const sel = document.getElementById(id);
                sel.innerHTML = `<option value="">${titulo}</option>` + opciones;
            };
            llenar('filtroCadena', makeOptions(visitasData.map(v => v.cadena)), 'Cadena (todas)');
            llenar('filtroSucursal', makeOptions(visitasData.map(v => v.sucursal)), 'Sucursal (todas)');
            llenar('filtroZona', makeOptions(visitasData.map(v => v.zona)), 'Zona (todas)');
            llenar('filtroSubzona', makeOptions(visitasData.map(v => v.subzona)), 'Subzona (todas)');
            llenar('filtroCanal', makeOptions(visitasData.map(v => v.canal)), 'Canal (todos)');
        }
        function applyFilters() {
            const fDesde = document.getElementById('fechaDesde').value;
            const fHasta = document.getElementById('fechaHasta').value;
            const fCad = document.getElementById('filtroCadena').value;
            const fSuc = document.getElementById('filtroSucursal').value;
            const fZona = document.getElementById('filtroZona').value;
            const fSubzona = document.getElementById('filtroSubzona').value;
            const fCanal = document.getElementById('filtroCanal').value;
            filteredVisitas = visitasData.filter(v => {
                if (fDesde) {
                    const vDate = new Date(v.fecha).setHours(0, 0, 0, 0);
                    const dDesde = new Date(fDesde).setHours(0, 0, 0, 0);
                    if (vDate < dDesde) return false;
                }
                if (fHasta) {
                    const vDate = new Date(v.fecha).setHours(0, 0, 0, 0);
                    const dHasta = new Date(fHasta).setHours(0, 0, 0, 0);
                    if (vDate > dHasta) return false;
                }
                if (fCad && v.cadena !== fCad) return false;
                if (fSuc && v.sucursal !== fSuc) return false;
                if (fZona && v.zona !== fZona) return false;
                if (fSubzona && v.subzona !== fSubzona) return false;
                if (fCanal && v.canal !== fCanal) return false;
                return true;
            });
            visitaIndex = 0;
            if (filteredVisitas.length === 0) {
                document.getElementById('contenedorVisitas').innerHTML = '<p>No hay visitas que coincidan.</p>';
                document.getElementById('prevVisita').style.display = 'none';
                document.getElementById('nextVisita').style.display = 'none';
                return;
            }
            renderVisita(visitaIndex);
        }
        function clearFilters() {
            ['fechaDesde', 'fechaHasta', 'filtroCadena', 'filtroSucursal', 'filtroZona', 'filtroSubzona', 'filtroCanal']
                .forEach(id => document.getElementById(id).value = '');
            applyFilters();
        }

        // lightbox setup


        // lightbox setup

        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        const lbDownload = document.getElementById('lightbox-download');
        const lbRotate = document.getElementById('lightbox-rotate');
        let currentImg = 0;

        function openLightbox(index) {
            currentImg = index;
            const previews = document.querySelectorAll('.img-preview');
            const sourceImg = previews[index];

            lbImg.src = sourceImg.src;

            // Sincronizar rotación
            const rot = sourceImg.getAttribute('data-rotation') || 0;
            const scale = (rot % 180 !== 0) ? 0.75 : 1;
            lbImg.style.transform = `rotate(${rot}deg) scale(${scale})`;
            lbImg.setAttribute('data-rotation', rot);

            updateLightboxInfo();
            lightbox.classList.add('activo');
        }

        function updateLightboxInfo() {
            const v = filteredVisitas[visitaIndex];
            const contentEl = document.getElementById('lightbox-info-content');
            if (v && contentEl) {
                contentEl.innerHTML = `
                    <span><i class="fas fa-building"></i> ${v.cadena}</span>
                    <span><i class="fas fa-map-marker-alt"></i> ${v.sucursal}</span>
                    <span><i class="fas fa-calendar-alt"></i> ${new Date(v.fecha).toLocaleDateString('es-AR', { timeZone: 'UTC' })}</span>
                `;
            }
        }

        lbRotate.onclick = (e) => {
            e.stopPropagation();
            let rot = (parseInt(lbImg.getAttribute('data-rotation') || 0) + 90) % 360;
            lbImg.setAttribute('data-rotation', rot);
            const scale = (rot % 180 !== 0) ? 0.75 : 1;
            lbImg.style.transform = `rotate(${rot}deg) scale(${scale})`;

            // Sincronizar de vuelta a la galería
            const previews = document.querySelectorAll('.img-preview');
            if (previews[currentImg]) {
                previews[currentImg].setAttribute('data-rotation', rot);
                previews[currentImg].style.transform = `rotate(${rot}deg) ${(rot % 180 !== 0) ? 'scale(0.8)' : ''}`;
            }
        };

        function changeImage(delta) {
            const v = filteredVisitas[visitaIndex];
            if (!v || !v.imagenes) return;

            // Lógica para saltar entre visitas si llegamos al final/inicio
            if (delta > 0 && currentImg === v.imagenes.length - 1) {
                visitaIndex = (visitaIndex + 1) % filteredVisitas.length;
                renderVisita(visitaIndex);
                currentImg = 0;
            } else if (delta < 0 && currentImg === 0) {
                visitaIndex = (visitaIndex - 1 + filteredVisitas.length) % filteredVisitas.length;
                renderVisita(visitaIndex);
                currentImg = filteredVisitas[visitaIndex].imagenes.length - 1;
            } else {
                currentImg = (currentImg + delta + v.imagenes.length) % v.imagenes.length;
            }

            // Usamos setTimeout para asegurar que el renderVisita terminó de inyectar el DOM
            setTimeout(() => {
                const previews = document.querySelectorAll('.img-preview');
                const sourceImg = previews[currentImg];
                if (!sourceImg) return;

                lbImg.src = sourceImg.src;

                // Aplicar rotación sincronizada
                const rot = parseInt(sourceImg.getAttribute('data-rotation') || 0);
                lbImg.setAttribute('data-rotation', rot);
                const scale = (rot % 180 !== 0) ? 0.75 : 1;
                lbImg.style.transform = `rotate(${rot}deg) scale(${scale})`;

                updateLightboxInfo();
            }, 0);
        }

        document.getElementById('lightbox-prev').onclick = (e) => { e.stopPropagation(); changeImage(-1); };
        document.getElementById('lightbox-next').onclick = (e) => { e.stopPropagation(); changeImage(1); };

        function closeLightbox() {
            lightbox.classList.remove('activo');
        }

        document.getElementById('lightbox-close').onclick = closeLightbox;
        lightbox.onclick = (e) => { if (e.target === lightbox) closeLightbox(); };

        if (lbDownload) {
            lbDownload.onclick = (e) => {
                e.stopPropagation();
                const a = document.createElement('a');
                a.href = lbImg.src;
                a.download = "foto_solvens.jpg";
                a.click();
            };
        }

        document.getElementById('prevVisita').onclick = () => {
            visitaIndex = (visitaIndex - 1 + filteredVisitas.length) % filteredVisitas.length;
            renderVisita(visitaIndex);
        };
        document.getElementById('nextVisita').onclick = () => {
            visitaIndex = (visitaIndex + 1) % filteredVisitas.length;
            renderVisita(visitaIndex);
        };

        // --- LÓGICA GENERACIÓN PPTX ---
        async function generarReportePPTX() {
            const idCliente = localStorage.getItem('id_usuario');
            if (!idCliente) return;

            const btn = document.getElementById('btnExportarPPTX');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Generando...</span>';
            btn.disabled = true;

            try {
                // 1. Obtener los datos frescos del servidor (ya filtrados por la última visita por PDV)
                const res = await fetch(`${URL_BASE}/imagenes-aprobadas-cliente?id_cliente=${idCliente}&latest=1`);
                if (!res.ok) throw new Error("Error en la descarga de datos");
                const ultimasVisitas = await res.json();

                if (!ultimasVisitas || ultimasVisitas.length === 0) {
                    alert("No hay visitas aprobadas recientes para exportar.");
                    return;
                }

                const pres = new PptxGenJS();
                pres.layout = 'LAYOUT_16x9';

                // --- A. DIAPOSITIVA DE PORTADA ---
                let coverSlide = pres.addSlide();
                coverSlide.background = { color: 'DC2626' }; // Rojo Solvens
                coverSlide.addText('Grupo Solvens', {
                    x: 0, y: 1.5, w: '100%', h: 1,
                    fontSize: 44, color: 'FFFFFF', bold: true, align: 'center'
                });
                coverSlide.addText('Reporte de Evidencia Fotográfica', {
                    x: 0, y: 2.5, w: '100%', h: 0.8,
                    fontSize: 24, color: 'FFFFFF', align: 'center'
                });
                coverSlide.addText(`Exportado el: ${new Date().toLocaleDateString('es-AR')}`, {
                    x: 0, y: 3.5, w: '100%', h: 0.5,
                    fontSize: 14, color: 'FFFFFF', italic: true, align: 'center'
                });

                // --- B. GENERACIÓN DE DIAPOSITIVAS POR PDV ---
                ultimasVisitas.forEach((v, vIdx) => {
                    let slide = pres.addSlide();

                    // Barra superior decorativa manual (Usamos un bloque con fondo para máxima compatibilidad)
                    slide.addText("", {
                        x: 0, y: 0, w: '100%', h: 0.4,
                        fill: { color: 'DC2626' }
                    });
                    slide.addText('Grupo Solvens', {
                        x: 8.5, y: 0.1, w: 1.5, h: 0.3,
                        color: 'FFFFFF', fontSize: 10, align: 'right'
                    });

                    // Datos del PDV
                    slide.addText(`${v.cadena}`, {
                        x: 0.5, y: 0.6, w: 9, h: 0.4,
                        fontSize: 20, color: 'DC2626', bold: true
                    });

                    slide.addText(`${v.sucursal} - ${v.localidad}`, {
                        x: 0.5, y: 1.0, w: 9, h: 0.3,
                        fontSize: 13, color: '333333'
                    });

                    slide.addText(`Fecha visita: ${new Date(v.fecha).toLocaleDateString('es-AR')}`, {
                        x: 0.5, y: 1.3, w: 9, h: 0.3,
                        fontSize: 11, color: '666666', italic: true
                    });

                    // Numeración
                    slide.addText(`Pág. ${vIdx + 1} de ${ultimasVisitas.length}`, {
                        x: 8.5, y: 5.3, w: 1, h: 0.3,
                        fontSize: 10, color: '999999', align: 'right'
                    });

                    // Imágenes
                    const imgs = v.imagenes;
                    if (imgs.length > 0) {
                        const marginX = 0.5;
                        const marginY = 1.7;

                        imgs.forEach((img, idx) => {
                            let x, y, w, h;
                            if (imgs.length === 1) {
                                w = 7.0; h = 3.6;
                                x = (10 - w) / 2;
                                y = marginY;
                            } else if (imgs.length === 2) {
                                w = 4.4; h = 3.6;
                                x = marginX + (idx * 4.6);
                                y = marginY;
                            } else if (imgs.length === 3 || imgs.length === 4) {
                                w = 4.4; h = 1.7;
                                x = marginX + ((idx % 2) * 4.6);
                                y = marginY + (Math.floor(idx / 2) * 1.9);
                            } else {
                                w = 2.9; h = 1.7;
                                x = marginX + ((idx % 3) * 3.1);
                                y = marginY + (Math.floor(idx / 3) * 1.9);
                            }

                            slide.addImage({
                                path: `../IMG/${img.ruta}`,
                                x: x, y: y, w: w, h: h,
                                sizing: { type: 'contain', w: w, h: h }
                            });
                        });
                    } else {
                        slide.addText("Sin imágenes aprobadas", {
                            x: 0.5, y: 3, w: 9, h: 1,
                            fontSize: 16, color: '999999', align: 'center'
                        });
                    }
                });

                const nombreArchivo = `Reporte_Solvens_${new Date().toISOString().split('T')[0]}.pptx`;
                await pres.writeFile({ fileName: nombreArchivo });
            } catch (err) {
                console.error("Error al generar PPTX:", err);
                alert("Hubo un error al generar el PowerPoint.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        document.getElementById('btnExportarPPTX').addEventListener('click', generarReportePPTX);

        document.addEventListener('DOMContentLoaded', cargarVisitasCliente);
    </script>
    <!-- filtros utility -->
    <script src="js/filtros.js"></script>

</body>

</html>
